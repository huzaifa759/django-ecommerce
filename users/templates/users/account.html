{% extends "core/base.html" %}

{% block title %}Account — Corner Shop{% endblock %}

{% block content %}
<div class="auth-card">
  <h1>Your account</h1>
  <p><strong>Username:</strong> {{ user.username }}</p>
  <p><strong>Email:</strong> {{ user.email|default:"—" }}</p>
  <p style="margin-top: 1rem;">
    <a class="btn" href="{% url 'orders:list' %}">View orders</a>
    <a class="btn btn-outline" href="{% url 'catalog:product_list' %}">Continue shopping</a>
  </p>
</div>
{% endblock %}
